<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git History Visual Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <header>
      <h1>Visual Repository Explorer</h1>
      <p>Explore commits, files, contributors, and modules.</p>
    </header>

    <section class="controls">
      <label for="timeline-range">Timeline</label>
      <input id="timeline-range" type="range" min="0" max="100" value="100" />
      <span id="timeline-label">Showing 100% most recent commits</span>
    </section>

    <main>
      <section id="graph-panel">
        <svg id="graph" role="img" aria-label="Repository evolution graph"></svg>
      </section>
      <aside id="detail-panel">
        <h2>Node Details</h2>
        <div id="detail-content">Click a node to inspect details.</div>
      </aside>
    </main>

    <script src="./data_loader.js"></script>
    <script src="./timeline.js"></script>
    <script src="./graph.js"></script>
  </body>
</html>
